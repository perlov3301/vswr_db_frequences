<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>f1 s1_VSWR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles.css" rel="stylesheet" />
    <link href="//fonts.googleapis.com/css?family=Raleway:400,300,600" 
      rel="stylesheet" type="text/css">

 <!-- CSS–– -->
 <link rel="stylesheet" type="text/css" href="css/normalize.css" >
 <link rel="stylesheet" type="text/css" href="css/skeleton.css" >

 <!-- Favicon -->
 <link rel="icon" type="image/png" href="images/favicon.png">
    <style>
      body {
        width: 96%;
        margin: 2% auto;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        border: 1px solid #ddd;
        font-size: 1.25rem;
        letter-spacing: 1px;
      }
      caption{
        caption-side: top ;
        padding:10px;
        font-weight:bold;
      }
      thead, tfoot {
        background-color: rgb(228, 240,245);
      }
      th {
        border: 1px solid #ddd;
        padding:8px 10px;
        height: 2.5rem;
        text-align: center;
      }
      td {
        border: 1px solid #ddd;
        padding: 8px 0;
        height: 2.5rem;
        text-align: center;
      }
      td:last-of-type {
        text-align: center;
      }
      tbody tr:nth-child(even) {
        background-color: rgb(248, 248, 248);
      }
      td input {
        min-width: 96%;
        box-sizing: border-box;
        border: none;
        border:0;
        padding: 4px;
        /* height: 100% */
      }
      
    </style>
    <!-- <link rel="stylesheet" href="styles.css"> -->
</head>
<body>
    <div class="container">
        <h2>vswr_db_f</h2>
        <h4>f1 stage1</h4>
        <form id="vswrForm">
          <div class="row">
            <div class="six columns inline_inputs" >
              <label for="generator" style="font-weight: bold;">generator Impedance (Ω):</label>
              <input type="number" 
                id="generatorR" 
                step="0.01" required>
            </div>
            <div class="six columns inline_inputs">
              <label for="frequency_n" style="font-weight: bold;">number of frequencies</label>
              <input type="number" 
                min="1" max="20"
                id="frequency_n" 
                step="1" required >
            </div>
          </div>
            <br>
          <button onclick="location.reload()"  class="button-primary">
              load the Table
          </button>
            <table id="mytable">
              <caption>frequency and load impedance</caption>
              <thead>
                <tr >
                  <th scope="col">frequency(MHz)</th>
                  <th scope="col">Load real R(Ω)</th>
                  <th scope="col">Load imag X(Ω)</th>
                </tr>
              </thead>
              <tbody id="frequencyTableBody">
                <!-- Rows will be dynamically added here -->
                <!-- <tr>
                  <td><input type="number" id="frequency1" step="any" required> </td>
                  <td><input type="number" id="load_real1" step="any" required> </td>
                  <td><input type="number" id="load_imag1" step="any" required> </td>
                </tr>
                <tr>
                  <td><input type="number" id="frequency2" step="any" required> </td>
                  <td><input type="number" id="load_real2" step="any" required> </td>
                  <td><input type="number" id="load_imag2" step="any" required> </td>
                </tr> -->
              </tbody>
            </table>
            <br>
            <br>
            <p>stage number 1</p>
            <label >line1 is ended by short circuit; line2 is ended by complex Impedance </label>
            <br><br>
            <div class="row">
              <div class="six columns inline_inputs">
                <label for="line1_R">line1 impedance (Ω)</label>
                <input type="number" style="padding-left:0.5rem;"
                  id="line1_R" 
                  step="any" required>
              </div>
              <div class="six columns inline_inputs">
                <label for="line1_L">line1 length (mm)</label>
                <input type="number" style="padding-left:0.5rem;"
                  id="line1_L" 
                  step="any" required>
              </div>
            </div>
            <div class="row">
              <div class="six columns inline_inputs">
                <label for="line2_R">line2 impedance (Ω)</label>
                <input type="number" style="padding-left:0.5rem;"
                  id="line2_R" 
                  step="any" required>
                
              </div>
              <div class="six columns inline_inputs">
                <label for="line2_L">line2 length (mm)</label>
                <input type="number" style="padding-left:0.5rem;"
                  id="line2_L" 
                  step="any" required>
              </div>
            </div>
            <br>
            <button class="button-primary" style="margin-top: .1rem;"
              type="submit">calculate</button>
        </form>
        <br>
        <fieldset>
          <legend>results</legend>
          <!-- <div id="result">Input Impedance:</div> -->
          <div id="result_vswr"></div>

          <div id="statusIndicator" 
             class="status-indicator">Ready to Input</div>
         
        </fieldset>
        
        <br>
       <textarea id="explanation" 
          rows="7"
          cols="71"
          minheight="10rem"
          readonly></textarea>
    </div>
    <script type="module" src="parallel_vswr.js"></script>
    <script type="module" src="timenow.js"></script>
    <script type="module" src="calculateVSWR.js"></script>
    <script type="module" src="parallel_zin.js"></script>

</body>
</html>
